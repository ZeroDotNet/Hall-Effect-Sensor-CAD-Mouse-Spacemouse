<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Magnetic Field Puppet Block Diagram</title>
  <desc id="desc">Signal flow from magnet through TLV493D and Pico firmware to servo and LED outputs.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.block{fill:#ffffff;stroke:#111827;stroke-width:2}.sensor{fill:#ecfeff;stroke:#0891b2}.code{fill:#f0fdf4;stroke:#16a34a}.out{fill:#fff7ed;stroke:#ea580c}.log{fill:#eef2ff;stroke:#4f46e5}
      .title{font:700 22px Arial,sans-serif;fill:#111827}.body{font:16px Arial,sans-serif;fill:#374151}.tiny{font:13px Arial,sans-serif;fill:#4b5563}
      .arrow{fill:none;stroke:#111827;stroke-width:3;marker-end:url(#arrow)}.soft{fill:none;stroke:#6b7280;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#arrowSoft)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/></marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/></marker>
  </defs>
  <rect class="bg" width="1200" height="620"/>

  <rect class="block sensor" x="70" y="205" width="190" height="130" rx="18"/>
  <text class="title" x="125" y="250">Magnet</text>
  <text class="body" x="104" y="286">hand motion</text>
  <text class="tiny" x="94" y="315">closer = stronger field</text>

  <rect class="block sensor" x="335" y="180" width="220" height="180" rx="18"/>
  <text class="title" x="398" y="225">TLV493D</text>
  <text class="body" x="372" y="263">samples X/Y/Z</text>
  <text class="body" x="378" y="292">over I2C 0x5E</text>
  <text class="tiny" x="370" y="325">3.3 V bus, GP4/GP5</text>

  <rect class="block code" x="635" y="95" width="250" height="130" rx="18"/>
  <text class="title" x="695" y="140">Mapping</text>
  <text class="body" x="674" y="176">Z axis -> servo angle</text>
  <text class="tiny" x="682" y="202">-900..900 raw -> 10..170 deg</text>

  <rect class="block code" x="635" y="315" width="250" height="130" rx="18"/>
  <text class="title" x="695" y="360">Intensity</text>
  <text class="body" x="669" y="396">field magnitude -> PWM</text>
  <text class="tiny" x="706" y="422">0..255 brightness</text>

  <rect class="block out" x="970" y="95" width="170" height="130" rx="18"/>
  <text class="title" x="1016" y="140">Servo</text>
  <text class="body" x="1002" y="176">moving pointer</text>
  <text class="tiny" x="1008" y="202">GP15 signal</text>

  <rect class="block out" x="970" y="315" width="170" height="130" rx="18"/>
  <text class="title" x="1018" y="360">LED</text>
  <text class="body" x="1002" y="396">field glow meter</text>
  <text class="tiny" x="1008" y="422">GP16 PWM</text>

  <rect class="block log" x="635" y="500" width="250" height="72" rx="16"/>
  <text class="title" x="696" y="542">Serial Log</text>
  <text class="tiny" x="674" y="563">x, y, z, magnitude, angle</text>

  <path class="arrow" d="M260 270 L335 270"/>
  <path class="arrow" d="M555 270 C590 270 596 160 635 160"/>
  <path class="arrow" d="M555 270 C590 270 596 380 635 380"/>
  <path class="arrow" d="M885 160 L970 160"/>
  <path class="arrow" d="M885 380 L970 380"/>
  <path class="soft" d="M760 445 L760 500"/>
  <path class="soft" d="M760 225 L760 500"/>
</svg>
