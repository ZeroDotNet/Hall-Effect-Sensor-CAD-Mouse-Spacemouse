[platformio]
default_envs = rp2040-tlv493d-1
src_dir = src
include_dir = include
lib_dir = lib
test_dir = test

[env:native]
platform = native
test_build_src = yes
build_flags =
  -D UNIT_TEST
build_src_filter =
  -<*>
  +<Buttons.cpp>
  +<Motion.cpp>
  +<Settings.cpp>

[env]
monitor_speed = 250000
extra_scripts = pre:scripts/select_sensor_backend.py
lib_deps = 
	infineon/XENSIV 3D Magnetic Sensor TLx493D@^1.1.2
	adafruit/Adafruit NeoPixel@^1.15.5




[env:arduino-pro-micro]
platform = atmelavr
;board = sparkfun_promicro16
board = micro
monitor_filters = time, default, printable
lib_deps =
	NicoHood/HID-Project@^2.8.4

framework = arduino
build_flags =
  -D TARGET_ARDUINO_PRO_MICRO
  -D USB_VID=0x256F
  -D USB_PID=0xC631
  
board_build.vid = 0x256F
board_build.pid = 0xC631
board_build.usb_manufacturer = 3Dconnexion
board_build.usb_product = Spacemouse Micro
upload_resetmethod = manual
monitor_speed = 250000

[env:rp2040]
platform = raspberrypi
board = pico
framework = arduino
upload_protocol = custom
upload_command = "$PYTHONEXE" "$PROJECT_DIR/scripts/rp2040_uf2_upload.py" "$BUILD_DIR/${PROGNAME}.uf2" "$UPLOAD_PORT"
build_flags =
  -D TARGET_RP2040
  ; Allow pluggable_usb_vid_pid.cpp.o to override the PluggableUSBD() singleton in
  ; libFrameworkArduino.a. Our .o is linked first so our version wins.
  -Wl,--allow-multiple-definition
  ; RP2040/Pico has 4 ADC pins: GP26-GP29. HES6-9 are disabled in hallSensorEnabled[] so
  ; they never produce readings, but must still be defined to avoid falling through to
  ; AVR-only A6-A9 defaults. They alias the same 4 ADC pins as HES0-3.
  -D HES_PIN_0=26
  -D HES_PIN_1=27
  -D HES_PIN_2=28
  -D HES_PIN_3=29
  -D HES_PIN_6=26
  -D HES_PIN_7=27
  -D HES_PIN_8=28
  -D HES_PIN_9=29
  -D BTN_PIN_0=0
  -D BTN_PIN_1=1
  -D BTN_PIN_2=6
  ; LEDs are opt-in while the onboard NeoPixel pin is unknown and the ring is disconnected.
  ; Enable the future ring with:
  -D ENABLE_LEDS=1 
  -D STATUS_LED_USE_RING_NEOPIXEL=1 
  -D STATUS_LED_RING_PIN=15 
  -D STATUS_LED_RING_COUNT=6
lib_deps =
  adafruit/Adafruit NeoPixel @ ~1.10.7
  infineon/XENSIV 3D Magnetic Sensor TLx493D @ ^1.1.2

[env:rp2040-tlv493d-3]
extends = env:rp2040
build_flags =
  ${env:rp2040.build_flags}
  -D SENSOR_BACKEND_TLV493D=1
  -D TLV493D_SENSOR_COUNT=3
  -D BUTTON_COUNT=0

[env:rp2040-led-test]
extends = env:rp2040
build_flags =
  ${env:rp2040.build_flags}
  -D ENABLE_LEDS=1
  -D STATUS_LED_TEST_ONLY=1
  -D STATUS_LED_USE_BUILTIN=1

[env:rp2040-rgb-led-test]
extends = env:rp2040
build_flags =
  ${env:rp2040.build_flags}
  -D ENABLE_LEDS=1
  -D STATUS_LED_TEST_ONLY=1
  -D STATUS_LED_TEST_RGB_CYCLE=1
  -D STATUS_LED_USE_ONBOARD_NEOPIXEL=1
  -D STATUS_LED_ONBOARD_PIN=24
  -D STATUS_LED_USE_BUILTIN=0

[env:rp2040-rgb-led-scan]
extends = env:rp2040
build_flags =
  ${env:rp2040.build_flags}
  -D ENABLE_LEDS=1
  -D STATUS_LED_TEST_ONLY=1
  -D STATUS_LED_TEST_RGB_CYCLE=1
  -D STATUS_LED_TEST_RGB_PIN_SWEEP=1
  -D STATUS_LED_USE_ONBOARD_NEOPIXEL=1
  -D STATUS_LED_USE_BUILTIN=0

[env:rp2040-tlv493d-3-teleplot-raw]
extends = env:rp2040-tlv493d-3
build_flags =
  ${env:rp2040-tlv493d-3.build_flags}
  -D DEBUG_LEVEL=1
  -D DEBUG_TELEPLOT=1

[env:rp2040-tlv493d-3-teleplot-centered]
extends = env:rp2040-tlv493d-3
build_flags =
  ${env:rp2040-tlv493d-3.build_flags}
  -D DEBUG_LEVEL=2
  -D DEBUG_TELEPLOT=1

[env:rp2040-tlv493d-3-teleplot-filtered]
extends = env:rp2040-tlv493d-3
build_flags =
  ${env:rp2040-tlv493d-3.build_flags}
  -D DEBUG_LEVEL=3
  -D DEBUG_TELEPLOT=1

[env:rp2040-tlv493d-1-teleplot-raw]
extends = env:rp2040-tlv493d-1
build_flags =
  ${env:rp2040-tlv493d-1.build_flags}
  -D DEBUG_LEVEL=1
  -D DEBUG_TELEPLOT=1

[env:rp2040-tlv493d-1-teleplot-centered]
extends = env:rp2040-tlv493d-1
build_flags =
  ${env:rp2040-tlv493d-1.build_flags}
  -D DEBUG_LEVEL=2
  -D DEBUG_TELEPLOT=1

[env:rp2040-tlv493d-1-teleplot-filtered]
extends = env:rp2040-tlv493d-1
build_flags =
  ${env:rp2040-tlv493d-1.build_flags}
  -D DEBUG_LEVEL=3
  -D DEBUG_TELEPLOT=1

[env:rp2040-tlv493d-3-teleplot-motion]
extends = env:rp2040-tlv493d-3
build_flags =
  ${env:rp2040-tlv493d-3.build_flags}
  -D DEBUG_LEVEL=4
  -D DEBUG_TELEPLOT=1

[env:rp2040-tlv493d-1-teleplot-motion]
extends = env:rp2040-tlv493d-1
build_flags =
  ${env:rp2040-tlv493d-1.build_flags}
  -D DEBUG_LEVEL=4
  -D DEBUG_TELEPLOT=1

[env:rp2040-tlv493d-1-teleplot]
extends = env:rp2040-tlv493d-1-teleplot-motion

[env:rp2040-tlv493d-3-teleplot]
extends = env:rp2040-tlv493d-3-teleplot-motion

[env:rp2040-tlv493d-3-teleplot-side-by-side]
extends = env:rp2040-tlv493d-3
build_flags =
  ${env:rp2040-tlv493d-3.build_flags}
  -D DEBUG_LEVEL=5
  -D DEBUG_TELEPLOT=1

[env:rp2040-tlv493d-1-teleplot-side-by-side]
extends = env:rp2040-tlv493d-1
build_flags =
  ${env:rp2040-tlv493d-1.build_flags}
  -D DEBUG_LEVEL=5
  -D DEBUG_TELEPLOT=1

[env:rp2040-tlv493d-1]
extends = env:rp2040
build_flags =
  ${env:rp2040.build_flags}
  -D SENSOR_BACKEND_TLV493D=1
  -D TLV493D_SENSOR_COUNT=1
  -D BUTTON_COUNT=0

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_unflags =
  -D ARDUINO_USB_MODE=1
build_flags =
  -D TARGET_ESP32S3
  -D ARDUINO_USB_MODE=0
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D HES_PIN_0=1
  -D HES_PIN_1=2
  -D HES_PIN_2=3
  -D HES_PIN_3=4
  -D HES_PIN_6=5
  -D HES_PIN_7=6
  -D HES_PIN_8=7
  -D HES_PIN_9=8
  -D BTN_PIN_0=9
  -D BTN_PIN_1=10
  -D BTN_PIN_2=11

